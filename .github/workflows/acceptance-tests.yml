name: Acceptance Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'acceptance_tests/**'
      - 'internal/**'
  push:
    branches:
      - main
    paths:
      - 'acceptance_tests/**'
      - 'internal/**'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      TF_VAR_auth_token: ${{ secrets.CAPELLA_AUTH_TOKEN }}
      TF_VAR_organization_id: ${{ secrets.CAPELLA_ORGANIZATION_ID }}
      TF_VAR_host: ${{ secrets.CAPELLA_HOST }}
      CAPELLA_OPENAPI_SPEC_PATH: ${{ github.workspace }}/openapi.generated.yaml

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so testselect can diff against the PR base
      - name: Set up Go
        uses: actions/setup-go@v4 # this action has caching built in
        with:
          go-version-file: 'go.mod'
          cache: false
        id: go
      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: cache-${{ github.run_id }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.9
          terraform_wrapper: false
      - name: Select acceptance tests
        id: select
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pattern=$(go run ./tools/testselect -base "origin/${{ github.base_ref }}")
          else
            pattern='.*' # full suite on push to main and manual dispatch
          fi
          if [ -z "$pattern" ]; then
            echo "No resource/data source changes detected; skipping acceptance tests."
          else
            echo "Acceptance test -run pattern: $pattern"
          fi
          echo "pattern=$pattern" >> "$GITHUB_OUTPUT"
      - name: Run acceptance tests
        if: steps.select.outputs.pattern != ''
        env:
          TESTACC_RUN: ${{ steps.select.outputs.pattern }}
        run: make testacc TESTACC_RUN="$TESTACC_RUN"
