name: Acceptance Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'acceptance_tests/**'
      - 'internal/**'
  push:
    branches:
      - main
    paths:
      - 'acceptance_tests/**'
      - 'internal/**'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      TF_VAR_auth_token: ${{ secrets.CAPELLA_AUTH_TOKEN }}
      TF_VAR_organization_id: ${{ secrets.CAPELLA_ORGANIZATION_ID }}
      TF_VAR_host: ${{ secrets.CAPELLA_HOST }}
      CAPELLA_OPENAPI_SPEC_PATH: ${{ github.workspace }}/openapi.generated.yaml

    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4 # this action has caching built in
        with:
          go-version-file: 'go.mod'
          cache: false
        id: go
      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: cache-${{ github.run_id }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.9
          terraform_wrapper: false
      - name: Run acceptance tests
        run: make testacc

  private-endpoint-aws:
    name: Private Endpoint (AWS) E2E
    runs-on: ubuntu-latest

    # Skips (does not fail) until the AWS test VPC is configured as a repo
    # variable, so adding this job doesn't turn CI red before the AWS side and
    # OIDC role are set up.
    if: ${{ vars.ACC_AWS_VPC_ID != '' }}

    permissions:
      id-token: write # required for the AWS OIDC token exchange
      contents: read

    env:
      TF_VAR_auth_token: ${{ secrets.CAPELLA_AUTH_TOKEN }}
      TF_VAR_organization_id: ${{ secrets.CAPELLA_ORGANIZATION_ID }}
      TF_VAR_host: ${{ secrets.CAPELLA_HOST }}
      CAPELLA_OPENAPI_SPEC_PATH: ${{ github.workspace }}/openapi.generated.yaml
      # The PE test does not need the shared app service / app endpoint, so skip
      # that provisioning in TestMain to keep the run short.
      ACC_SKIP_APP_SERVICE: "1"
      # AWS test VPC. Must live in us-east-1 to match the cluster region that
      # TestMain provisions (see acceptance_tests/cluster.go), and in the account
      # the OIDC role can act on.
      ACC_AWS_REGION: us-east-1
      ACC_AWS_VPC_ID: ${{ vars.ACC_AWS_VPC_ID }}
      ACC_AWS_SUBNET_IDS: ${{ vars.ACC_AWS_SUBNET_IDS }}
      ACC_AWS_VPC_CIDR: ${{ vars.ACC_AWS_VPC_CIDR }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: 'go.mod'
          cache: false
        id: go
      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: cache-${{ github.run_id }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.9
          terraform_wrapper: false
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PE_TEST_ROLE_ARN }}
          aws-region: us-east-1
      - name: Run private endpoint AWS acceptance test
        run: |
          TF_ACC=1 go test ./acceptance_tests/ \
            -run '^TestAccPrivateEndpointsDataSourceWithEndpoint$' \
            -v -timeout 60m -count=1
